version: 2

project_name: sexton

builds:
  - main: ./cmd/sexton
    binary: sexton
    # sexton is a Unix daemon: its control plane is a Unix-domain socket and its
    # hook runner uses Setpgid/Kill process groups, neither of which exist on
    # Windows. only linux and darwin are supported build targets.
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/michaelquigley/push/build.Version={{.Tag}}
      - -X github.com/michaelquigley/push/build.Hash={{.FullCommit}}
      - -X github.com/michaelquigley/push/build.Date={{.Date}}
      - -X github.com/michaelquigley/push/build.Branch={{.Branch}}
      - -X github.com/michaelquigley/push/build.CGO=0
      - -X "github.com/michaelquigley/push/build.Builder=goreleaser"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: michaelquigley
    name: sexton
  draft: false
  prerelease: auto
